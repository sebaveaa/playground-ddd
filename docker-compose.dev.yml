services:
  postgres:
    image: postgres:16-alpine
    container_name: umbral-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: umbral-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_AMQP_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: umbral-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./infra/keycloak/import:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 5s
      retries: 10

  mission-design-service:
    build:
      context: .
      dockerfile: src/mission-design/service/Umbral.MissionDesign.Api/Dockerfile
    container_name: umbral-mission-design-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=umbral;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Search Path=mission_design
      Auth__Authority: ${AUTH_AUTHORITY}
      Auth__RequireHttpsMetadata: ${AUTH_REQUIRE_HTTPS_METADATA}
      Auth__Audience: umbral-mission-design-api
    ports:
      - "${MISSION_DESIGN_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  session-operations-service:
    build:
      context: .
      dockerfile: src/session-operations/service/Umbral.SessionOperations.Api/Dockerfile
    container_name: umbral-session-operations-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=umbral;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Search Path=session_operations
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__User: ${RABBITMQ_DEFAULT_USER}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
      Auth__Authority: ${AUTH_AUTHORITY}
      Auth__RequireHttpsMetadata: ${AUTH_REQUIRE_HTTPS_METADATA}
      Auth__Audience: umbral-session-operations-api
      SignalR__Enabled: true
    ports:
      - "${SESSION_OPERATIONS_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  scoring-audit-service:
    build:
      context: .
      dockerfile: src/scoring-audit/service/Umbral.ScoringAudit.Api/Dockerfile
    container_name: umbral-scoring-audit-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=umbral;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Search Path=scoring_audit
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__User: ${RABBITMQ_DEFAULT_USER}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
      Auth__Authority: ${AUTH_AUTHORITY}
      Auth__RequireHttpsMetadata: ${AUTH_REQUIRE_HTTPS_METADATA}
      Auth__Audience: umbral-scoring-audit-api
    ports:
      - "${SCORING_AUDIT_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  edge-proxy:
    build:
      context: .
      dockerfile: src/edge-proxy/Umbral.EdgeProxy/Dockerfile
    container_name: umbral-edge-proxy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      AllowedOrigins__0: http://localhost:5173
      AllowedOrigins__1: http://localhost:3000
      ReverseProxy__Clusters__mission-design__Destinations__primary__Address: http://mission-design-service:8080/
      ReverseProxy__Clusters__session-operations__Destinations__primary__Address: http://session-operations-service:8080/
      ReverseProxy__Clusters__scoring-audit__Destinations__primary__Address: http://scoring-audit-service:8080/
      ReverseProxy__Clusters__keycloak__Destinations__primary__Address: http://keycloak:8080/
    ports:
      - "${EDGE_PROXY_PORT}:8080"
    depends_on:
      mission-design-service:
        condition: service_started
      session-operations-service:
        condition: service_started
      scoring-audit-service:
        condition: service_started
      keycloak:
        condition: service_started

volumes:
  postgres-data:
  rabbitmq-data:
